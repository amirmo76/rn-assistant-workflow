_Context_:
    Card: "Just a shell container"
    CardHeader: "Just a layout wrapper which positions its children"
    CardTitle: "Just a text element with some styling"
    CardSubtitle: "Just a text element with some styling"
    Field: "Just a layout wrapper which positions its children"
    InputGroupInput: "The interactive input element which is used within an InputGroup"
    InputGroupAddon: "The additional element which is used within an input group at the end or the beginning of the input and renders its children"
---
LoginCard:
  - Card:
      - CardHeader:
          - CardTitle
          - CardSubtitle
      - CardContent:
          - Field:
              - Label:
                - "@context: NO_CHANGE"
              - InputGroup:
                  - InputGroupInput
                  - InputGroupAddon:
                      - Icon
          - Field:
              - Label
              - InputGroup:
                  - InputGroupInput
                  - InputGroupAddon:
                      - Button:
                        - "@context: variant=ghost, size=icon-sm, icon=eye-closed"
      - CardFooter:
          - Button:
              - "@context: variant=primary, size=lg"
---
Button:
  - Icon